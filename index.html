<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Donnections</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
</head>

<body>
    <div id="dontainer">
        <div class="button-row">
            <button id="mode">Play</button>
            <button id="clear">Clear</button>
        </div>
        <div id="table">
            <div class="row" data-row="0">
                <div class="cell" data-col="0"></div>
                <div class="cell" data-col="1"></div>
                <div class="cell" data-col="2"></div>
                <div class="cell" data-col="3"></div>
            </div>
            <div class="row" data-row="1">
                <div class="cell" data-col="0"></div>
                <div class="cell" data-col="1"></div>
                <div class="cell" data-col="2"></div>
                <div class="cell" data-col="3"></div>
            </div>
            <div class="row" data-row="2">
                <div class="cell" data-col="0"></div>
                <div class="cell" data-col="1"></div>
                <div class="cell" data-col="2"></div>
                <div class="cell" data-col="3"></div>
            </div>
            <div class="row" data-row="3">
                <div class="cell" data-col="0"></div>
                <div class="cell" data-col="1"></div>
                <div class="cell" data-col="2"></div>
                <div class="cell" data-col="3"></div>
            </div>
        </div>
        <div class="button-row">
            <button class="color-button yellow" id="yellow"></button>
            <button class="color-button green" id="green"></button>
            <button class="color-button blue" id="blue"></button>
            <button class="color-button purple" id="purple"></button>
        </div>
    </div>
</body>

</html>
